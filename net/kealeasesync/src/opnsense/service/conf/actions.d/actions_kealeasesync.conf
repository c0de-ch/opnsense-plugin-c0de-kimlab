[run]
command:/usr/local/opnsense/scripts/OPNsense/KeaLeaseSync/kea-lease-sync.sh
parameters:
type:script
message:Running Kea Lease DNS Sync
description:Kea Lease DNS Sync

[status]
command:/usr/local/opnsense/scripts/OPNsense/KeaLeaseSync/get_status.py
parameters:
type:script_output
message:Retrieving Kea Lease Sync status

[hosts]
command:/usr/local/opnsense/scripts/OPNsense/KeaLeaseSync/get_hosts.py
parameters:
type:script_output
message:Retrieving synced hosts

[log]
command:grep -i kea-lease-sync /var/log/system/latest.log 2>/dev/null | tail -50
parameters:
type:script_output
message:Retrieving Kea Lease Sync logs
