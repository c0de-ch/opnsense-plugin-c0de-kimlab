name: Update Repository

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -yqq zstd

      - name: Download all release packages
        run: |
          mkdir -p repo/All
          # Download .pkg from every release
          for tag in $(gh release list --json tagName -q '.[].tagName'); do
            echo "Checking release ${tag}..."
            gh release download "${tag}" --pattern '*.pkg' --dir repo/All/ --skip-existing 2>/dev/null || true
          done
          ls -la repo/All/

          # Keep only the latest version of each package
          cd repo/All
          for name in $(ls *.pkg 2>/dev/null | sed 's/-[0-9].*$//' | sort -u); do
            latest=$(ls ${name}-*.pkg 2>/dev/null | sort -V | tail -1)
            for f in ${name}-*.pkg; do
              if [ "$f" != "$latest" ]; then
                echo "Removing old: $f (keeping $latest)"
                rm "$f"
              fi
            done
          done
          cd ../..
          echo "Final packages:"
          ls -la repo/All/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build repository index
        run: python3 scripts/build-repo.py repo repo

      - name: Create repo config and index page
        run: |
          cat > repo/c0de-kimlab.conf << 'REPOCONF'
          c0de-kimlab: {
            url: "https://c0de-ch.github.io/opnsense-plugin-c0de-kimlab",
            enabled: yes,
            priority: 200
          }
          REPOCONF

          cat > repo/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head><title>c0de-kimlab OPNsense Repository</title></head>
          <body>
          <h1>c0de-kimlab OPNsense Plugin Repository</h1>
          <h2>Setup</h2>
          <pre>fetch -o /usr/local/etc/pkg/repos/c0de-kimlab.conf https://c0de-ch.github.io/opnsense-plugin-c0de-kimlab/c0de-kimlab.conf
          pkg update</pre>
          <h2>Install</h2>
          <pre>pkg install os-kealeasesync</pre>
          <p><a href="https://github.com/c0de-ch/opnsense-plugin-c0de-kimlab">Source on GitHub</a></p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: build-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
