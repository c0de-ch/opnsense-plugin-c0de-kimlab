name: Update Repository

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest release package
        run: |
          mkdir -p staging/All
          for tag in $(gh release list --json tagName -q '.[].tagName'); do
            echo "Checking release ${tag}..."
            gh release download "${tag}" --pattern '*.pkg' --dir staging/All/ --skip-existing 2>/dev/null || true
          done

          # Keep only the latest version of each package
          cd staging/All
          for name in $(ls *.pkg 2>/dev/null | sed 's/-[0-9].*$//' | sort -u); do
            latest=$(ls ${name}-*.pkg 2>/dev/null | sort -V | tail -1)
            for f in ${name}-*.pkg; do
              if [ "$f" != "$latest" ]; then
                echo "Removing old: $f (keeping $latest)"
                rm "$f"
              fi
            done
          done
          cd ../..
          echo "Packages:"
          ls -la staging/All/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build repository with FreeBSD pkg
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          copyback: true
          prepare: |
            pkg install -y pkg
          run: |
            cd staging
            pkg repo . || { echo "pkg repo failed"; exit 1; }
            echo "Repository files:"
            ls -la
            ls -la All/

      - name: Create repo config and index page
        run: |
          cat > staging/c0de-kimlab.conf << 'REPOCONF'
          c0de-kimlab: {
            url: "https://c0de-ch.github.io/opnsense-plugin-c0de-kimlab",
            enabled: yes,
            priority: 200
          }
          REPOCONF

          cat > staging/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head><title>c0de-kimlab OPNsense Repository</title></head>
          <body>
          <h1>c0de-kimlab OPNsense Plugin Repository</h1>
          <h2>Setup</h2>
          <pre>fetch -o /usr/local/etc/pkg/repos/c0de-kimlab.conf https://c0de-ch.github.io/opnsense-plugin-c0de-kimlab/c0de-kimlab.conf
          pkg update</pre>
          <h2>Install</h2>
          <pre>pkg install os-kealeasesync</pre>
          <p><a href="https://github.com/c0de-ch/opnsense-plugin-c0de-kimlab">Source on GitHub</a></p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staging

  deploy:
    needs: build-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
