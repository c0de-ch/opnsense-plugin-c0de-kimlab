name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build FreeBSD pkg
        run: |
          sudo apt-get update -qq && sudo apt-get install -yqq zstd
          python3 scripts/build-pkg.py \
            "${{ steps.version.outputs.version }}" \
            net/kealeasesync/src \
            "os-kealeasesync-${{ steps.version.outputs.version }}.pkg"

      - name: Build distribution tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIST_NAME="os-kealeasesync-${VERSION}"
          STAGING="/tmp/${DIST_NAME}"

          mkdir -p "${STAGING}/usr/local"
          cp -R net/kealeasesync/src/etc "${STAGING}/usr/local/"
          cp -R net/kealeasesync/src/opnsense "${STAGING}/usr/local/"
          cp net/kealeasesync/pkg-descr "${STAGING}/"
          cp net/kealeasesync/Makefile "${STAGING}/"

          cat > "${STAGING}/install.sh" << 'INSTALL_EOF'
          #!/bin/sh
          set -e
          PREFIX="${1:-/usr/local}"
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          echo "Installing os-kealeasesync to ${PREFIX}..."
          cp -R "${SCRIPT_DIR}/usr/local/etc" "${PREFIX}/"
          cp -R "${SCRIPT_DIR}/usr/local/opnsense" "${PREFIX}/"
          chmod +x "${PREFIX}/opnsense/scripts/OPNsense/KeaLeaseSync/"*.sh
          chmod +x "${PREFIX}/opnsense/scripts/OPNsense/KeaLeaseSync/"*.py
          service configd restart
          echo "Done. Configure at Services > Kea Lease Sync."
          INSTALL_EOF
          chmod +x "${STAGING}/install.sh"

          cat > "${STAGING}/uninstall.sh" << 'UNINSTALL_EOF'
          #!/bin/sh
          set -e
          PREFIX="${1:-/usr/local}"
          echo "Removing os-kealeasesync..."
          rm -f  "${PREFIX}/etc/inc/plugins.inc.d/kealeasesync.inc"
          rm -rf "${PREFIX}/opnsense/mvc/app/controllers/OPNsense/KeaLeaseSync"
          rm -rf "${PREFIX}/opnsense/mvc/app/models/OPNsense/KeaLeaseSync"
          rm -rf "${PREFIX}/opnsense/mvc/app/views/OPNsense/KeaLeaseSync"
          rm -rf "${PREFIX}/opnsense/scripts/OPNsense/KeaLeaseSync"
          rm -f  "${PREFIX}/opnsense/service/conf/actions.d/actions_kealeasesync.conf"
          rm -rf "${PREFIX}/opnsense/service/templates/OPNsense/KeaLeaseSync"
          rm -f  "${PREFIX}/opnsense/www/js/widgets/KeaLeaseSync.js"
          rm -f  "${PREFIX}/opnsense/www/js/widgets/Metadata/KeaLeaseSync.xml"
          rm -rf "${PREFIX}/etc/kealeasesync"
          rm -rf /var/run/kealeasesync
          service configd restart
          echo "Done."
          UNINSTALL_EOF
          chmod +x "${STAGING}/uninstall.sh"

          tar -czf "/tmp/${DIST_NAME}.tar.gz" -C /tmp "${DIST_NAME}"
          tar -czf "/tmp/${DIST_NAME}-src.tar.gz" \
            --transform "s|^|${DIST_NAME}-src/|" \
            net/kealeasesync/ README.md .gitignore

          mv /tmp/${DIST_NAME}.tar.gz /tmp/${DIST_NAME}-src.tar.gz .

      - name: Generate changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --no-decorate)
          else
            CHANGES=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi

          cat > /tmp/changelog.md << CHANGELOG_EOF
          ## Install

          ### Option 1: pkg install (recommended)
          \`\`\`sh
          # Copy to OPNsense and install
          scp os-kealeasesync-${VERSION}.pkg root@<opnsense>:/tmp/
          ssh root@<opnsense> "pkg install /tmp/os-kealeasesync-${VERSION}.pkg"
          \`\`\`

          Or as a one-liner on OPNsense:
          \`\`\`sh
          fetch -o /tmp/os-kealeasesync-${VERSION}.pkg https://github.com/c0de-ch/opnsense-plugin-c0de-kimlab/releases/download/${TAG_NAME}/os-kealeasesync-${VERSION}.pkg
          pkg install /tmp/os-kealeasesync-${VERSION}.pkg
          \`\`\`

          ### Option 2: tarball install
          \`\`\`sh
          fetch -o /tmp/os-kealeasesync.tar.gz https://github.com/c0de-ch/opnsense-plugin-c0de-kimlab/releases/download/${TAG_NAME}/os-kealeasesync-${VERSION}.tar.gz
          tar -xzf /tmp/os-kealeasesync.tar.gz -C /tmp
          sh /tmp/os-kealeasesync-${VERSION}/install.sh
          \`\`\`

          ### Uninstall
          \`\`\`sh
          pkg remove os-kealeasesync
          \`\`\`

          ## Changes

          ${CHANGES}
          CHANGELOG_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          files: |
            os-kealeasesync-${{ steps.version.outputs.version }}.pkg
            os-kealeasesync-${{ steps.version.outputs.version }}.tar.gz
            os-kealeasesync-${{ steps.version.outputs.version }}-src.tar.gz
          generate_release_notes: false

      - name: Update package repository
        run: gh workflow run repo.yml
        env:
          GH_TOKEN: ${{ github.token }}
